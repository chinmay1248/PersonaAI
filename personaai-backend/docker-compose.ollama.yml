version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: personaai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: personaai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: personaai-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    container_name: personaai-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${LLM_CHAT_MODEL}
      OLLAMA_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      until ollama list >/dev/null 2>&1; do
        echo "Waiting for Ollama...";
        sleep 2;
      done;
      ollama pull "$OLLAMA_CHAT_MODEL";
      ollama pull "$OLLAMA_EMBEDDING_MODEL";
      ollama list

  api:
    build: .
    container_name: personaai-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LLM_PROVIDER: ollama
      ENABLE_LLM: "true"
      LLM_BASE_URL: http://ollama:11434/v1
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  worker:
    build: .
    container_name: personaai-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
      LLM_PROVIDER: ollama
      ENABLE_LLM: "true"
      LLM_BASE_URL: http://ollama:11434/v1
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: personaai-caddy
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  caddy_data:
  caddy_config:
