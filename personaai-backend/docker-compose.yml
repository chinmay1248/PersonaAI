version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: personaai-db
    environment:
      POSTGRES_USER: ${DB_USER:-personaai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-personaai}
      POSTGRES_DB: ${DB_NAME:-personaai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-personaai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: personaai-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: personaai-api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-personaai}:${DB_PASSWORD:-personaai}@db:5432/${DB_NAME:-personaai_db}"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    container_name: personaai-worker
    command: celery -A app.workers.celery_app:celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-personaai}:${DB_PASSWORD:-personaai}@db:5432/${DB_NAME:-personaai_db}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
